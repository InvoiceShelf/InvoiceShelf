#-------------------------------------------
# InvoiceShelf SQLite docker-compose variant
# Repo : https://github.com/InvoiceShelf/docker
#-------------------------------------------

services:
  webapp:
    container_name: invoiceshelf-variant-sqlite
    build:
      context: ../../
      dockerfile: docker/production/Dockerfile
    ports:
      - "8090:8080" # 8090 is the public port.
    volumes:
      - invoiceshelf_storage:/var/www/html/storage
    networks:
      - invoiceshelf
    environment:
      - APP_NAME=InvoiceShelf
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8090
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/storage/app/database.sqlite # please don't touch this!
      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=240
      - SESSION_DOMAIN=localhost
      - SANCTUM_STATEFUL_DOMAINS=localhost:8090
    restart: unless-stopped
  minio:
    container_name: invoiceshelf-dev-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-invoiceshelf}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-invoiceshelf123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - invoiceshelf-dev-minio:/data
    networks:
      - invoiceshelf-dev

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-invoiceshelf}" "${MINIO_ROOT_PASSWORD:-invoiceshelf123}"; do
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET:-invoiceshelf-local}
    networks:
      - invoiceshelf-dev
networks:
  invoiceshelf:
volumes:
  invoiceshelf_storage:
