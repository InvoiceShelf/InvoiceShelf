#-------------------------------------------
# InvoiceShelf MySQL docker-compose variant
# Repo : https://github.com/InvoiceShelf/docker
#-------------------------------------------

services:
  database:
    container_name: invoiceshelf-mysql
    image: mariadb:10
    environment:
      - MYSQL_DATABASE=invoiceshelf
      - MYSQL_USER=invoiceshelf
      - MYSQL_PASSWORD=somepass
      - MARIADB_ALLOW_EMPTY_ROOT_PASSWORD=true
    expose:
      - 3306
    volumes:
      - invoiceshelf_mysql:/var/lib/mysql
    networks:
      - invoiceshelf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb-admin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  webapp:
    container_name: invoiceshelf-variant-mariadb
    build:
        context: ../../
        dockerfile: docker/production/Dockerfile
    environment:
      - APP_NAME=Laravel
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8090
      - DB_CONNECTION=mariadb
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=invoiceshelf
      - DB_USERNAME=invoiceshelf
      - DB_PASSWORD=somepass
      - DB_PASSWORD_FILE=
      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=240
      - SESSION_DOMAIN=localhost
      - SANCTUM_STATEFUL_DOMAINS=localhost:8090
    volumes:
      - invoiceshelf_storage:/var/www/html/storage/
    ports:
      - "8099:8080" # 8099 is the public port.
    networks:
      - invoiceshelf
    restart: unless-stopped
    depends_on:
      - database
  minio:
    container_name: invoiceshelf-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-invoiceshelf}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-invoiceshelf123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - invoiceshelf-dev-minio:/data
    networks:
      - invoiceshelf-dev

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-invoiceshelf}" "${MINIO_ROOT_PASSWORD:-invoiceshelf123}"; do
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET:-invoiceshelf-local}
    networks:
      - invoiceshelf-dev
networks:
  invoiceshelf:

volumes:
  invoiceshelf_mysql:
  invoiceshelf_storage:
